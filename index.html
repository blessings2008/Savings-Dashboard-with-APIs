<!DOCTYPE html>
<html lang="en">
<head>

  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">

  <!-- Open Graph / link preview — ABSOLUTE URLs required for crawlers -->
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="PocketVault">

  <meta property="og:description" content="Set savings goals, automate savings, and track spending using Airtel Money in Malawi.">

  <div id="app">

  <script type="module" src="app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(() => {});
      });
    }
  </script>
